# True-color passthrough (TERM inside tmux is tmux-256color; outer TERM = alacritty)
set -ag terminal-overrides ",alacritty:RGB,xterm-256color:RGB"

# Keep window indices contiguous when one is closed
set -g renumber-windows on

# ============================================
# System clipboard via OSC 52 (works across SSH + nested tmux)
# ============================================
# set-clipboard on: tmux's OWN copy-mode yanks emit the OSC 52 escape so the
# selection lands in the clipboard of the OUTER terminal emulator (the laptop's
# alacritty) — even from a tmux on the headless workbench reached over SSH.
# The default 'external' only RELAYS OSC 52 from apps inside tmux; it does NOT
# emit for copy-mode copies, which is why `y` only ever hit the local (invisible
# on the headless workbench) xclip selection and the copy appeared to vanish.
set -s set-clipboard on
# Advertise the OSC 52 (Ms) capability for every outer terminal regardless of
# the reported TERM, so the escape is emitted whether the outer term identifies
# as alacritty / xterm / screen.
set -ga terminal-features '*:clipboard'

bind-key -T copy-mode-vi v send-keys -X begin-selection
# No external command needed: set-clipboard on makes these emit OSC 52, setting
# the laptop's system clipboard directly (and locally, via alacritty, the X
# CLIPBOARD selection too — so GUI paste on the laptop also works).
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# Fast navigation in copy mode
bind -T copy-mode-vi C-k send-keys -X -N 4 cursor-up
bind -T copy-mode-vi C-j send-keys -X -N 4 cursor-down
bind -T copy-mode-vi C-h send-keys -X previous-word
bind -T copy-mode-vi C-l send-keys -X next-word-end

# Auto-rename windows to working directory basename
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}#{?#{m:claude*,#{pane_current_command}}, ●,}'

# Enable focus events (needed by neovim autoread, etc.)
set -g focus-events on

# vim-like pane switching
bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

# repeatable window navigation (Ctrl-a n n n to advance multiple windows)
set-option -g repeat-time 800
bind-key -r n next-window
bind-key -r p previous-window

# ERTYUIO keys for windows 10+ (extends default 0-9 bindings)
bind-key e select-window -t :10
bind-key r select-window -t :11
bind-key t select-window -t :12
bind-key y select-window -t :13
bind-key u select-window -t :14
bind-key i select-window -t :15
bind-key o select-window -t :16

# show current working directory (useful when running TUI apps)
bind-key P display-message "#{pane_current_path}"

# Fuzzy-find windows across all sessions by directory/command
bind-key / run-shell -b "tmux list-windows -a -F '#{session_name}:#{window_index} #{b:pane_current_path} #{pane_current_command}' | fzf-tmux -p 80%,50% --reverse | cut -d' ' -f1 | xargs -r tmux switch-client -t"

# Fuzzyclaw dashboard (Alt+F)
bind-key -n M-F display-popup -E -w 90% -h 70% -T ' fuzzyclaw ' \
    'fuzzyclaw dashboard'

# ============================================
# Floating Popups (Gruvbox-styled, rounded borders)
# ============================================
# Global popup defaults
set -g popup-border-lines rounded
set -g popup-border-style 'fg=#504945'
set -g popup-style 'bg=#282828'

# Persistent scratchpad toggles (Alt+<key>: grove/Gold/violet/Vapor/…) — one popup
# per slot: detach if already inside it, else pop up (colored border + codename
# title) attaching or creating its session. These 12 bindings are GENERATED at
# home-manager build time from the canonical slot table (scripts/tmux-scratch-slots.sh)
# and appended to this config by nix/programs/tmux/default.nix — so the palette +
# codenames live in ONE place, not re-hardcoded per binding here. Edit the slot table,
# not this file, to add/rename a scratchpad.

# Scratchpad picker (Alt+Shift+T) — toggle/create named scratchpads
bind -n M-T display-popup -E -w 80% -h 80% -S 'fg=#d65d0e' -T ' scratchpads ' \
    ~/.config/tmux/scratch-picker.sh

# Monitor popup (Alt+m) — live HUD showing last lines of all 6 scratches.
# Detach first if invoked from inside a scratch so we don't nest popups.
bind -n M-m if-shell -F '#{m:scratch*,#{session_name}}' \
    { detach-client } \
    { display-popup -E -w 80% -h 90% -S 'fg=#665c54' -T ' monitor ' \
        '~/.config/tmux/scratch-monitor.sh' }

# Initiatives dashboard (Alt+i) — grouped view of every active Claude session
# with project + LLM-generated summary. Read-only; dismiss with q/Esc.
bind -n M-i if-shell -F '#{m:scratch*,#{session_name}}' \
    { detach-client } \
    { display-popup -E -w 95% -h 90% -S 'fg=#665c54' -T ' initiatives ' \
        '~/.config/tmux/initiatives.sh' }

# Toggle most recent scratch-* session (Alt+[), excludes scratch/scratch2
bind -n M-[ run-shell '\
    s=$(tmux list-sessions -F "#{session_activity} #{session_name}" \
        | grep " scratch-" | sort -rn | head -1 | cut -d" " -f2); \
    if [ -z "$s" ]; then exit 0; fi; \
    if [ "$(tmux display-message -p "#{session_name}")" = "$s" ]; then \
        tmux detach-client; \
    else \
        tmux display-popup -d "#{pane_current_path}" -xC -yC -w 80% -h 80% \
            -T " $s " -E "tmux attach-session -t $s"; \
    fi'

# Clean up stale M-h binding (was duplicate of scratch2)
unbind -n M-h

# Lazygit popup (prefix+g)
bind-key g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
    -T ' lazygit ' lazygit

# k9s popup (prefix+K)
bind-key K display-popup -E -w 95% -h 95% \
    -T ' k9s ' k9s

# Hide scratch session from session switcher (prefix+s)
bind-key s choose-tree -Zs -f '#{?#{m:scratch*,#{session_name}},0,1}'

# Disable resurrect manual save (continuum auto-saves every 5min)
unbind-key C-s

# ============================================
# Idle-Fade Window Colors (8-color Gruvbox scale)
# ============================================
# Color windows based on background activity using pipe-pane
# Thresholds: <10m bright-green, 10-30m green, 30-60m aqua, 1-2h yellow,
#             2-4h orange, 4-8h red, 8-24h purple, >24h gray
# Bell override: magenta+bold

# Activity monitoring (disabled to avoid status bar noise)
set -g monitor-activity off
set -g visual-activity off

# Bell configuration - sound via tmux hook (bypasses Alacritty)
set -g monitor-bell on
set -g visual-bell off
set -g bell-action current
set-hook -g alert-bell 'run-shell "paplay /run/current-system/sw/share/sounds/freedesktop/stereo/message.oga &"'

# Pipe-pane activity tracking (bypasses bell system entirely)
# - Switch: stop pipe on focused window, start on all background windows
# - Window-linked: start pipe on new window if not current
set-hook -g after-select-window 'run-shell -b "~/.config/tmux/pipe-activity.sh switch"'
set-hook -g window-linked 'run-shell -b "~/.config/tmux/pipe-activity.sh linked"'
set-hook -g session-created 'run-shell -b "~/.config/tmux/pipe-activity.sh init"'

# Activity telemetry: forward focus changes into the collector spool (reuses the
# above tracking; thin shipper only). Appended to the existing hooks via -a so it
# does not clobber the pipe-activity bindings.
set-hook -ga after-select-window 'run-shell -b "~/.config/tmux/activity-emit.sh window-focus"'
set-hook -ga client-session-changed 'run-shell -b "~/.config/tmux/activity-emit.sh session"'

# Status bar refresh rate (2s - balance between responsiveness and CPU)
set -g status-interval 2

# Window status format - batch updater overrides per-window via set-window-option
# Default format used for new windows before first batch update cycle
set -g window-status-format '#[fg=#665c54] #I:#W#F '
set -g window-status-current-format '#[fg=#ebdbb2,bg=#504945,bold] #I:#W #[default]'

# ============================================
# Custom Gruvbox-style Theme
# ============================================
set -g status-style 'bg=#282828,fg=#ebdbb2'
set -g window-status-style 'bg=default'
set -g window-status-activity-style 'bg=default'
# Mode indicator: prefix=yellow, normal=cyan
set -g status-left '#{?client_prefix,#[bg=#d79921],#[bg=#83a598]}#[fg=#282828,bold] #S #[default] #(~/.config/tmux/scratch-status.sh) '
# Batch idle-color updater runs once per status-interval (replaces per-window #() calls)
set -g status-right '#(~/.config/tmux/idle-update.sh)#(~/.config/tmux/claude-counters.sh) #[fg=#ebdbb2]%H:%M #[fg=#282828,bg=#83a598] #H '
set -g status-left-length 90
set -g status-right-length 70

# Pane borders
set -g pane-border-style 'fg=#504945'
set -g pane-active-border-style 'fg=#83a598'

# Message styling
set -g message-style 'bg=#282828,fg=#ebdbb2'


# ============================================
# Named Buffers (1/2/3)
# ============================================
# Copy to register 1/2/3 in copy-mode. load-buffer -b bN - reads the selection
# from stdin into the named buffer (the old `set-buffer -b bN` ignored stdin and
# saved empty buffers); set-clipboard on additionally emits OSC 52 to the system
# clipboard, so no separate xclip pipe is needed.
bind -T copy-mode-vi 1 send-keys -X copy-pipe-and-cancel "tmux load-buffer -b b1 -"
bind -T copy-mode-vi 2 send-keys -X copy-pipe-and-cancel "tmux load-buffer -b b2 -"
bind -T copy-mode-vi 3 send-keys -X copy-pipe-and-cancel "tmux load-buffer -b b3 -"

# Paste from named buffers (prefix + Alt-1/2/3)
bind M-1 paste-buffer -b b1
bind M-2 paste-buffer -b b2
bind M-3 paste-buffer -b b3

# Interactive buffer picker (prefix+B; P is already bound to display path)
bind B choose-buffer
